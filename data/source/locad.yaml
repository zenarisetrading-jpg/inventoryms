    CustomWebstoreOrder:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        unique_order_identifier:
          type: string
          minLength: 3
          maxLength: 32
        order_reference:
          type: string
          nullable: true
          maxLength: 32
        currency:
          oneOf:
          - $ref: '#/components/schemas/CostPriceCurrencyEnum'
          - $ref: '#/components/schemas/BlankEnum'
        payment_method:
          $ref: '#/components/schemas/PaymentMethodEnum'
        cod_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        billing_address:
          $ref: '#/components/schemas/CustomAddress'
        shipping_address:
          $ref: '#/components/schemas/CustomAddress'
        total_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        shipment_type:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/ShipmentTypeEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        order_items:
          type: array
          items:
            $ref: '#/components/schemas/CustomWebstoreOrderItem'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        payment_verified:
          type: boolean
          description: Indicates whether the payment has been successfully verified
            or not. Default is True. Order will be in UNPAID status if False.
        is_gift:
          type: boolean
        gift_message:
          type: string
          nullable: true
          maxLength: 255
        is_paused:
          type: boolean
          nullable: true
        fulfilment_groups:
          type: array
          items:
            $ref: '#/components/schemas/CustomWebstoreFulfilmentGroup'
      required:
      - billing_address
      - created_at
      - id
      - order_items
      - payment_method
      - shipping_address
      - unique_order_identifier
      - updated_at
    CustomWebstoreOrderItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        catalogue_product_id:
          type: string
        quantity:
          type: integer
          maximum: 2147483647
          minimum: 0
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        warehouse_id:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        inventory_sku:
          type: string
          nullable: true
          maxLength: 128
        fulfilment_group_id:
          type: string
          nullable: true
          maxLength: 255
        should_fulfil:
          type: boolean
        shipment_required:
          type: boolean
        order_item_id:
          type: string
          maxLength: 32
        cancel_reason:
          type: string
          readOnly: true
        cancel_by:
          type: string
          readOnly: true
        cancelled_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        cancelled:
          type: boolean
          readOnly: true
        shipment_status:
          readOnly: true
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/CustomWebstoreOrderItemShipmentStatusEnum'
          - $ref: '#/components/schemas/NullEnum'
        tracking_number:
          type: string
          readOnly: true
        tracking_url:
          type: string
          readOnly: true
          nullable: true
        shipment_provider_name:
          type: string
          readOnly: true
