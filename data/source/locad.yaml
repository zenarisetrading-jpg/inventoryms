        packing_video_available:
          type: boolean
          nullable: true
      required:
      - id
      - order_items
      - return_created_on
      - status
      - warehouse
      - wms_order_id
      - wms_order_number
    WarehouseReturnOrderItemOpenAPI:
      type: object
