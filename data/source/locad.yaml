          type: string
        description: "Filter by consigment numbers (comma-separated). \nExample: `?consignment_number=C-1737451050,C-1737397050`"
      - in: query
        name: created_after
        schema:
          type: string
        description: "Filter by inbound consignment creation time. \nExample: `?created_after=2024-01-01:00:00:00`"
      - in: query
        name: created_before
        schema:
          type: string
        description: "Filter by inbound consignment creation time. \nExample: `?created_before=2024-01-01:00:00:00`"
      - in: query
        name: limit
        schema:
          type: integer
        description: 'Number of results to return per page (default: 20, max: 5000)'
        examples:
          LimitOf10:
            value: 10
            summary: Fetch 10 items per page.
            description: This example demonstrates setting the limit to 10 items per
              page.
          LimitOf50:
            value: 50
            summary: Fetch 50 items per page.
            description: This example demonstrates setting the limit to 50 items per
              page.
      - in: query
