    put:
      operationId: Update Inbound Consignment
      description: "This endpoint allows you to update an existing inbound consignment.\
        \ The following fields can be updated: - `tracking_number`, `carrier_name`,\
        \ `tracking_url`, `estimated_arrival_date`, `asn_note`, and the existing list\
        \ of products while creation. Please save the **task_id** returned in the\
