  /openapi/seller/callback_event_types/:
    get:
      operationId: openapi_seller_callback_event_types_retrieve
      description: |2


        By calling this endpoint, you will get the list of callback types that you can subscribe to, along with their respective sample response objects.

        **Click on each callback type below to see the details and example payload.**

        <details>
        <summary><strong>ShipmentOrderStatusUpdate</strong></summary>

        This callback notifies subscribers of any changes in shipment order status, such as status, carrier tracking status, tracking number, tracking URL, and carrier name. It ensures real-time updates about the progress and delivery details of an order.

        **Sample Callback Payload:**
        ```json
        {
          "brand": {
            "id": 1
          },
          "callback_type": "ShipmentOrderStatusUpdate",
          "events": [
            {
              "shipment_order_id": 1,
              "carrier_order_id": 1,
              "unique_order_identifier": "1234567890",
              "shipment_status": "Shipped",
              "tracking_number": "1234567890",
              "tracking_url": "https://www.google.com",
              "is_waybill_ready": true,
              "carrier_name": "DHL",
              "callback_event_id": 1,
              "event_at": "2025-11-06T19:43:20.819353+08:00"
            }
          ]
        }
        ```
        </details>

