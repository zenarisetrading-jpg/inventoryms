  /openapi/{version}/return_orders/:
    get:
      operationId: openapi_return_orders_list
      description: List all return orders created in our System (Locad OMS). The endpoint
        supports extensive filtering capabilities including return order timeframes,
        marketplace status, geographical filters, and more. Refer to the query parameters
        for all available filtering options.
      summary: List Return Orders
      parameters:
      - in: query
        name: end_date
        schema:
          type: string
        description: "Retrieve all orders created before the given datetime. \nExample:\
          \ `?end_date=2024-01-01:00:00:00`"
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: mapped_marketplace_statuses
        schema:
          type: string
          enum:
          - ACCEPTED
          - CANCELLED
          - COMPLETED
          - PRE_ACCEPTED
          - REJECTED
          - UNKNOWN
        description: "Filter by oms status. \nExample: `?mapped_marketplace_statuses=ON_HOLD`"
      - in: query
        name: marketplace
        schema:
          type: string
        description: "Filter by marketplace connection name. \nExample: `?marketplace=non-integrated"
      - in: query
        name: marketplace_type
        schema:
          type: string
          enum:
          - lazada
          - shopee
          - tiktok
        description: "Filter by marketplace type. \nExample: `?marketplace=non-integrated"
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: search
        schema:
          type: string
        description: "Search by marketplace_order_ref or marketplace_order_id or marketplace_return_order_number\
          \ or wms_order_number or wms_order_id or tracking_number . \nExample: `?search=ordertest123`"
      - in: query
        name: start_date
        schema:
          type: string
        description: "Retrieve all orders created after the given datetime. \nExample:\
          \ `?start_date=2024-01-01:00:00:00`"
      - in: path
        name: version
        schema:
          type: string
          pattern: ^(v2)$
        required: true
      - in: query
        name: warehouse
        schema:
          type: string
        description: "Filter by warehouse id. \nExample: `?warehouse=12`"
      - in: query
        name: warehouse_status
        schema:
          type: string
          enum:
          - CANCELLED
          - COMPLETED
          - EXPIRED
          - ON_HOLD
          - PENDING
          - RECEIVED
          - UNKNOWN
          - VALIDATED
        description: "Filter by Warehouse Status (comma-separated). \nExample: `?warehouse_status=ON_HOLD,CANCELLED`"
