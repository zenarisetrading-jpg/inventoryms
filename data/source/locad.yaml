    get:
      operationId: List Inbound Consignments
      description: |+
        This endpoint allows users to retrieve a list of inbound consignments.<b>Example `curl` Request:</b>
        ```bash
        curl --location '{{url}}/openapi/v2/consignments/inbound_consignments?limit=20&offset=0' \
