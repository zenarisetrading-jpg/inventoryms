          description: Not Found - The requested resource does not exist.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorException'
          description: Internal Server Error - Unexpected error occurred.
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopedInboundConsignmentOpenAPIList'
          description: ''
    post:
      operationId: Create Inbound Consignment
      description: "This endpoint allows you to create a new inbound consignment.\
        \ Please save the **task_id** returned in the response.\n\n **Note**: Creation\
        \ of Inbound Consignment Products is asynchronous in this API. This will return\
        \ the task ID which is submitted to create the Inbound Consignment Products.\
        \ \n\nTo know the status of the task, you can do one of the following:-, \n\
        1. Use [**Get Bulk Create or Update Status API**](#operation/Get%20Bulk%20Create%20or%20Update%20Status)\
        \ by providing the task ID.\n\n     **OR**\n2. Subscribe to the **InboundProductBulkUploadStatus**\
        \ callback type in [**Seller Webhooks**](#operation/create-callback-subscription)\
        \ section.\n\n<b>Example `curl` Request:</b>\n```bash\ncurl --location '{{url}}/openapi/v2/consignments/inbound_consignments/'\
        \ \\\n--header 'Content-Type: application/json' \\\n--header 'Authorization:\
        \ Bearer {{token}}' \\\n--data '{\n    \"consignment_number\": \"Locad-OpenAPI-Test-13\"\
        ,\n    \"consignment_date\": \"2024-11-13\",\n    \"address\": \"test address\"\
        ,\n    \"tracking_number\": \"test tracking number\",\n    \"carrier_name\"\
        : \"test carrier name\",\n    \"tracking_url\": \"test tracking url\",\n \
        \   \"warehouse_id\": 20,\n    \"warehouse_transfer\": false,\n    \"products\"\
        : [\n        {\n            \"sku\": \"INV_SKU_ITEM00099\",\n            \"\
        consignment_quantity\": 10,\n            \"expiry_date\": \"2026-12-01\"\n\
        \        }\n    ],\n    \"asn_note\": \"test asn note\"\n}'\n```\n\n"
      parameters:
