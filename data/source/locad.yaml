openapi: 3.0.3
info:
  title: Locad API
  version: 2.0 (v2)
  x-logo:
    url: https://locad-public.s3.amazonaws.com/icons/Locad_wordmark_Green+1+(2).png
    backgroundColor: '#000000'
    altText: Locad
  description: "To use legacy (v1) APIs **[Old API Documentation](https://locad-api-doc.s3.ap-southeast-1.amazonaws.com/v1_legacy/index_2.html)**\n\
    \nLocad Open Platform provides a comprehensive suite of APIs to manage your inventory\
    \ and streamline supply chain operations. You can explore the full API documentation\
    \ here in the following section. (**[Swagger UI](https://dashboard.golocad.com/api/schema/swagger-ui/)**)\n\
    **NOTE that these API comes with Throttling limit of rate: 90 and burst: 120 (api\
    \ calls per minute)**\n\n### Recommended API Integration Order:\n1. **Authentication:**\n\
    \   Begin by integrating the **Authentication API** to obtain secure access tokens.\
    \ This step is essential for authenticating and authorizing your requests within\
    \ the Locad system.\n\n2. **Warehouse:**\n   Use the **Warehouse APIs** to get\
    \ information about connected warehouses and their availability for operations\
    \ like inbound.\n\n3. **Inventory Products API:**\n   Use the **Inventory Products\
    \ API** to create, update, and manage your inventory. This allows you to register\
    \ products, define attributes, and monitor stock levels.\n\n4. **Inbound Consignment\
    \ API:**\n   Once your products are registered, integrate the **Inbound Consignment\
    \ API** to create the Purchase order so that the stock can be inbounded in the\
    \ warehouse.\n\n5. **Outbound Bulk Order (B2B) API:**\n   After setting up inventory\
    \ and recording inbound shipments, utilize the **Outbound Bulk Order API** to\
    \ create B2B orders. \n\n6. **Custom Webstore (B2C) API:**\n   After setting up\
    \ inventory and recording inbound shipments, utilize the **Custom Webstore (B2C)\
    \ API** to create B2C orders, send waybills (if required), and retrieve order\
    \ information. You can also create catalogue product if kit product is there,\
    \ and retrieve stock information by location. \n\n7. **Seller Webhooks:**\n  \
    \ After completing the above steps, you can subscribe to the webhooks available\
    \ in our system, such as OrderStatusUpdate and InboundStatusUpdate, to receive\
    \ real-time updates. All available webhooks and their sample data are provided.\
    \ Additionally, you can use the corresponding APIs to subscribe to these webhooks.\
    \ \n\n8. **Shipping APIs (Separate Service):**\n   This is an separate service\
    \ and only required if you want to ship parcels from your own warehouse with Locad's\
    \ Carriers. Utilize the **Shipping API** to create and manage the shipment orders,\
    \ pickup locations, etc. \n\nBy following this integration sequence, you can ensure\
    \ a smooth and scalable workflow for managing inventory and supply chain operations\
    \ within the **Locad system**. Each API builds upon the previous one, creating\
    \ a seamless process from authentication to order fulfillment.If you wish to **only**\
    \ use the **Shipping APIs**, you will need to integrate **only Authentication\
    \ before Shipping APIs**"
paths:
  /openapi/{version}/auth/token/obtain/{application}/:
    post:
      operationId: Generate JWT Access Token
      description: |-
        This endpoint allows you to obtain a **JWT Access Token** to authenticate and authorize your API requests to the Locad system. To generate the token, you must provide your **username**, **password**, and **brand_id** (which will be provided by the Locad team). The **JWT Access Token** will be used for subsequent API calls to access secure resources.

        ### Token Validity:
        `access : 24 Hours`
        `refresh : 7 Days`
        ### Request Example:
        Use the following `curl` command to obtain a JWT Access Token:

        ```bash
        curl --location '{{url}}/openapi/v2/auth/token/obtain/MERCHANT_APP/' \
        --header 'Content-Type: application/json' \
        --data-raw '{
            "username": "{{username}}",
            "password": "{{password}}",
            "data": {
                "brand_id": {{brand_id}}
            }
        }''
        ```

        Replace `username`, `password`, and `brand_id` with the appropriate values.

        Upon successful authentication, you will receive an **Access Token** and a **Refresh Token**, which will be used to authorize your requests and refresh your token when it expires. The response includes the **access token** and **refresh token**.

        The **JWT Access Token** is required for making authorized API calls within the Locad system. It is valid for a set period, after which it can be refreshed using the **Refresh JWT Access Token** API.
      parameters:
      - in: path
        name: application
        schema:
          type: string
        description: 'Application Name : Valid Inputs - MERCHANT_APP'
        required: true
      - in: path
        name: version
        schema:
          type: string
          pattern: ^(v2)$
        required: true
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
            examples:
              GenerateJWTAccessTokenRequest:
                value:
                  username: abc@test.com
                  password: '#23333'
                  data:
                    brand_id: 2262
                summary: Generate JWT Access Token Request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopedTokenObtainPair'
              examples:
                SuccessfulJWTTokenResponse:
                  value:
                    success: true
                    data:
                      refresh: <refresh_token>
                      access: <access_token>
                    message: null
                  summary: Successful JWT Token Response
          description: JWT token successfully generated. You can now use the provided
            access token for authorized API requests.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestException'
          description: Bad Request - Invalid input.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedException'
          description: Unauthorized - Invalid or expired credentials.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenException'
          description: Forbidden - You do not have permission to access this resource.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundException'
          description: Not Found - The requested resource does not exist.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorException'
          description: Internal Server Error - Unexpected error occurred.
  /openapi/{version}/auth/token/refresh/:
    post:
      operationId: Refresh JWT Access Token
      description: |-
        This endpoint allows you to **refresh** your **JWT Access Token** using a valid **refresh token**. The **refresh token** is provided when the original JWT Access Token is generated and is used to obtain a new access token when the current one expires. This allows continued access to the Locad system without requiring the user to reauthenticate.

        ### Token Validity:
        `access : 24 Hours`
        ### Request Example:
        Use the following `curl` command to refresh your JWT Access Token:

        ```bash
        curl --location '{{url}}/openapi/v2/auth/token/refresh/' \
        --header 'Content-Type: application/json' \
        --data '{
            "refresh": "{{refresh_token}}"
        }''
        ```

        Replace `refresh_token` with your valid refresh token. The response will include a new **access token** that can be used for subsequent API requests.

        Upon successful refresh, you will receive a new **access token** that can be used for authentication in further API calls. The **refresh token** is also valid for a limited time, after which a new refresh token will need to be obtained.
      parameters:
      - in: path
        name: version
        schema:
          type: string
          pattern: ^(v2)$
        required: true
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
            examples:
              RefreshJWTAccessTokenRequest:
                value:
                  refresh: <refresh_token>
                summary: Refresh JWT Access Token Request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopedTokenRefresh'
              examples:
                SuccessfulRefreshJWTAccessTokenResponse:
                  value:
                    success: true
                    data:
                      access: <access_token>
                    message: null
                  summary: Successful Refresh JWT Access Token Response
          description: Successful Refresh JWT Access Token Response. You will receive
            a new access token to continue making authorized API requests.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestException'
          description: Bad Request - Invalid input.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedException'
          description: Unauthorized - Invalid or expired credentials.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenException'
          description: Forbidden - You do not have permission to access this resource.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundException'
          description: Not Found - The requested resource does not exist.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorException'
          description: Internal Server Error - Unexpected error occurred.
  /openapi/{version}/consignments/channels/:
    get:
      operationId: List Outbound Bulk Order Channels
      description: |+
        Retrieve a paginated list of outbound bulk order channels. Example:

        ```bash
        curl --location '{{url}}/openapi/v2/consignments/channels/?limit=10&offset=0' \
        --header 'Authorization: Bearer {{token}}'
        ```

      parameters:
      - in: query
        name: limit
        schema:
          type: integer
        description: 'Number of results to return per page (default: 20, max: 5000)'
        examples:
          LimitOf10:
            value: 10
            summary: Fetch 10 items per page.
            description: This example demonstrates setting the limit to 10 items per
              page.
          LimitOf50:
            value: 50
            summary: Fetch 50 items per page.
            description: This example demonstrates setting the limit to 50 items per
              page.
      - in: query
        name: offset
        schema:
          type: integer
        description: 'The initial index from which to return the results (default:
          0)'
        examples:
          OffsetOf0:
            value: 0
            summary: Start from the first item.
            description: This example starts the listing from the first item (index
              0).
          OffsetOf20:
            value: 20
            summary: Skip the first 20 items.
            description: This example skips the first 20 items and starts listing
              from the 21st item (index 20).
      - in: path
        name: version
        schema:
          type: string
          pattern: ^(v2)$
        required: true
      tags:
      - Outbound Bulk Order (B2B)
      responses:
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestException'
          description: Bad Request - Invalid input.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedException'
          description: Unauthorized - Invalid or expired credentials.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenException'
          description: Forbidden - You do not have permission to access this resource.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundException'
          description: Not Found - The requested resource does not exist.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorException'
          description: Internal Server Error - Unexpected error occurred.
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopedBulkOrderChannelOpenAPIList'
          description: ''
