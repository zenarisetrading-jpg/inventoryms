  /openapi/{version}/products/inventory/:
    get:
      operationId: List Inventory Products
      description: |-
        Retrieve inventory products with filtering, pagination, and search. Example:

        ```bash
        curl --location '{{url}}/openapi/v2/products/inventory?search=Wax' \
        --header 'Authorization: Bearer {{token}}'
        ```
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
        description: 'Number of results to return per page (default: 20, max: 5000)'
        examples:
          LimitOf10:
            value: 10
            summary: Fetch 10 items per page.
            description: This example demonstrates setting the limit to 10 items per
              page.
          LimitOf50:
            value: 50
            summary: Fetch 50 items per page.
            description: This example demonstrates setting the limit to 50 items per
              page.
      - in: query
        name: offset
        schema:
          type: integer
        description: 'The initial index from which to return the results (default:
          0)'
        examples:
          OffsetOf0:
            value: 0
            summary: Start from the first item.
            description: This example starts the listing from the first item (index
              0).
          OffsetOf20:
            value: 20
            summary: Skip the first 20 items.
            description: This example skips the first 20 items and starts listing
              from the 21st item (index 20).
      - in: query
        name: search
        schema:
          type: string
        description: Search products by name or SKU.
        examples:
          SearchByName:
            value: Wax
            summary: Search products with names containing "Wax".
            description: This example searches for products where the name contains
              the term "Wax".
          SearchBySKU:
            value: SKU1
            summary: Search products with SKU containing "SKU1".
            description: This example searches for products where the SKU contains
              "SKU1".
      - in: query
        name: sku
        schema:
          type: comma-separated strings
        description: Filter by one or more SKUs (comma-separated). Please note if
          1 of the sku is not found than the api call will not result in any error
          and result data will simply not contain that sku
        examples:
          SearchCommaSeparated:
            value: SKU1,SKU2,SKU3
            summary: Search products with sku=SKU1 or sku=SKU2
            description: This example searches for products where the sku matches
              completely with either SKU1 or SKU2 and shows 1 or more products based
              on whatever matches.
      - in: path
        name: version
        schema:
          type: string
          pattern: ^(v2)$
        required: true
      tags:
      - Inventory Product
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopedInventoryProductV2List'
              examples:
                SuccessfulListInventoryProductsResponse:
                  value:
                    success: true
                    data:
                      count: 16
                      next: http://dashboard.golocad.com/openapi/v2/products/inventory/?limit=2&offset=2
                      previous: null
                      results:
                      - id: 257030
                        sku: selling-plans-ski-wax-special-selling-plans-ski-wax
                        name: Selling Plans Ski Wax - Special Selling Plans Ski Wax
                        upc: '16283146152'
                        active: true
