components:
  schemas:
    AvailableCarrierConnectionsResponse:
      type: object
      properties:
        shipment_type:
          $ref: '#/components/schemas/ShipmentTypeEnum'
        available_carrier_connections:
          type: array
          items:
            $ref: '#/components/schemas/CarrierConnectionSerializerV2'
        recommended:
          type: boolean
      required:
      - available_carrier_connections
      - recommended
      - shipment_type
    AvailableCarrierConnectionsSerializerV2:
      type: object
      properties:
        sender_address:
          $ref: '#/components/schemas/PickupLocationAddressSerializerV2'
        drop_address:
          $ref: '#/components/schemas/PickupLocationAddressSerializerV2'
        height_cm:
          type: number
          format: double
        width_cm:
          type: number
          format: double
        length_cm:
          type: number
          format: double
        weight_gr:
          type: number
          format: double
        is_cod:
          type: boolean
        package_price:
          type: number
          format: double
        package_currency:
          $ref: '#/components/schemas/CostPriceCurrencyEnum'
        order_type:
          $ref: '#/components/schemas/OrderTypeEnum'
        pickup_location_id:
          type: integer
        shipment_type:
          $ref: '#/components/schemas/ShipmentTypeEnum'
      required:
      - drop_address
      - height_cm
      - is_cod
      - length_cm
      - order_type
      - package_currency
      - package_price
      - pickup_location_id
      - shipment_type
      - weight_gr
      - width_cm
    BadRequestException:
      type: object
      properties:
        success:
          type: boolean
          default: false
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
          default:
          - code: bad_request
            detail: Invalid input. Please check the provided data.
    BlankEnum:
      enum:
      - ''
    BulkOrderAddressOpenAPI:
      type: object
      properties:
        address_line1:
          type: string
          description: Address line 1
        address_line2:
          type: string
          description: Address line 2
        address_line3:
          type: string
          description: Address line 3
        email:
          type: string
          maxLength: 255
        phone:
          type: string
          maxLength: 32
        city:
          type: string
          description: City
        state:
          type: string
          description: State
        country:
          type: string
          description: Country
        suburb:
          type: string
          description: Suburb
        zipcode:
          type: string
          description: Zipcode
      required:
      - address_line1
      - city
      - country
      - state
      - zipcode
    BulkOrderBrandDestinationAddressOpenAPI:
      type: object
      properties:
        address_reference_name:
          type: string
        address:
          allOf:
          - $ref: '#/components/schemas/BulkOrderAddressOpenAPI'
          description: Address
        channel:
          allOf:
          - $ref: '#/components/schemas/BulkOrderChannelOpenAPI'
          readOnly: true
          description: Channel
        channel_id:
          type: integer
          writeOnly: true
          description: Either channel_id or channel_code must be provided. If both
            are given, channel_id must match the given channel_code.
        channel_code:
          type: string
          writeOnly: true
          description: Channel Code (Seller defined. We will create a channel if not
            exists already), note that either channel_id or channel_code must be provided.
            If both are given, channel_id must match the given channel_code.
      required:
      - channel
    BulkOrderBrandDestinationID:
      type: object
      properties:
        destination_address_id:
          type: integer
      required:
      - destination_address_id
    BulkOrderChannelOpenAPI:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: Id for bulk outbound order channel
        channel_name:
          type: string
          description: Channel name for bulk outbound order channel
        channel_code:
          type: string
          description: Channel code for bulk outbound order channel
        channel_desc:
          type: string
          description: Channel Description for bulk outbound order channel
      required:
      - channel_code
      - channel_desc
      - channel_name
      - id
    CallbackSubscription:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        callback_type:
          $ref: '#/components/schemas/CallbackTypeEnum'
        active:
          type: boolean
        url:
          type: string
          format: uri
          maxLength: 255
        auth_header_key:
          type: string
          nullable: true
          maxLength: 255
        auth_token:
          type: string
          nullable: true
          maxLength: 255
        headers:
          nullable: true
        send_single_event_in_callback:
          type: boolean
          nullable: true
      required:
      - callback_type
      - id
      - url
    CallbackTypeEnum:
      enum:
      - CustomOrderStatusUpdate
      - CustomProductStockUpdate
      - InboundStatusUpdate
      - InboundProductBulkUploadStatus
      - InventoryProductBulkUploadStatus
      - ReportDirectFile
      - ReportDownloadLink
      - ShipmentOrderStatusUpdate
      - TransportVehicleTrackingUpdate
      type: string
      description: |-
        * `CustomOrderStatusUpdate` - CustomOrderStatusUpdate
        * `CustomProductStockUpdate` - CustomProductStockUpdate
        * `InboundStatusUpdate` - InboundStatusUpdate
        * `InboundProductBulkUploadStatus` - InboundProductBulkUploadStatus
        * `InventoryProductBulkUploadStatus` - InventoryProductBulkUploadStatus
        * `ReportDirectFile` - ReportDirectFile
        * `ReportDownloadLink` - ReportDownloadLink
        * `ShipmentOrderStatusUpdate` - ShipmentOrderStatusUpdate
        * `TransportVehicleTrackingUpdate` - TransportVehicleTrackingUpdate
    CarrierConnection:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        connection_name:
          type: string
          maxLength: 64
          pattern: ^[-a-zA-Z0-9_]+$
        carrier_name:
          type: string
        country:
          type: string
          readOnly: true
      required:
      - carrier_name
      - country
      - id
    CarrierConnectionPickupLocationSerializerV2:
      type: object
      properties:
        carrier_connection:
          $ref: '#/components/schemas/CarrierConnection'
        approved:
          type: boolean
        in_progress:
          type: boolean
        rejection_reason:
          type: string
          nullable: true
          maxLength: 128
        rejection_disputed:
          type: boolean
        enabled:
          type: string
          readOnly: true
      required:
      - carrier_connection
      - enabled
    CarrierConnectionSerializerV2:
      type: object
      properties:
        carrier_connection_id:
          type: string
        carrier_connection_name:
          type: string
        carrier_name:
          type: string
        serviceable:
          type: boolean
        recommended:
          type: boolean
        carrier_forward_sla_days:
          type: number
          format: double
        carrier_return_sla_days:
          type: number
          format: double
        price_brackets:
          type: array
          items:
            $ref: '#/components/schemas/PriceBracket'
      required:
      - carrier_connection_id
      - carrier_connection_name
      - carrier_forward_sla_days
      - carrier_name
      - carrier_return_sla_days
      - price_brackets
      - recommended
      - serviceable
    CarrierConnectionShipmentTypePickupLocationSerializerV2:
      type: object
      properties:
        shipment_type:
          $ref: '#/components/schemas/ShipmentTypeEnum'
        carrier_connections:
          type: array
          items:
            $ref: '#/components/schemas/CarrierConnectionPickupLocationSerializerV2'
      required:
      - carrier_connections
      - shipment_type
    CarrierOrderItem:
      type: object
      properties:
        order_item_id:
          type: string
          nullable: true
          maxLength: 128
        item_name:
          type: string
          nullable: true
          maxLength: 128
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        quantity:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        hs_code:
          type: string
          nullable: true
          maxLength: 128
        weight_gr:
          type: string
          format: decimal
          pattern: ^-?\d{0,7}(?:\.\d{0,3})?$
    CarrierPickupLocationDetailSerializerV2:
      type: object
      properties:
        known_as:
          type: string
