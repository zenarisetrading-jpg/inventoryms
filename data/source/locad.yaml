        <details>
        <summary><strong>ReportDirectFile</strong></summary>

        This callback sends the Report file in the format specified (xlsx/csv) when the report is generated. Please note that you will get the file in multipart/form-data with the attribute file.There will be another attribute callback_data which will have file metadata as well as other callback event related information.

        **Sample of Key callback_data in multipart/form-data:**
        ```json
        {
          "brand": {
            "id": 1
          },
          "callback_type": "ReportDirectFile",
          "events": [
            {
              "filename": "ProductStatement_2024-03-07.csv",
              "content_type": "text/csv",
              "file_size": 1024,
              "callback_event_id": 1,
              "event_at": "2025-11-06T19:43:27.736123+08:00"
            }
          ]
        }
        ```
        </details>

