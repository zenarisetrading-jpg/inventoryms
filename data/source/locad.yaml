        * `GM` - GM
        * `LB` - LB
servers:
- url: https://base_url
  description: BASE URL
tags:
- name: Authentication
  description: |-
    The **Authentication** APIs in the **Locad system** facilitates secure user access using **JWT (JSON Web Tokens)**. It provides endpoints for generating and refreshing access tokens, enabling authorized users to interact with the system while ensuring security and scalability.<br><br>**Generate JWT Access Token**: Allows users to generate token by providing their credentials (username, password and brand_id). Once authenticated, users receive an **access token** and a **refresh token**. These tokens are required for accessing protected endpoints within the Locad system. The `username`, `password` and `brand_id` is provided by the Locad team before the integration starts. Once generated, the access token is valid for the **next 24 hours**.<br>

    **Refresh JWT Access Token**: If the **access token** expires, users can refresh it by providing the **refresh token**. This generates a new **access token**, ensuring uninterrupted access to the system without needing to re-enter credentials. Once generated, the refresh token is valid for the **next 7 days**.<br><br>
- name: Inventory Product
  description: An **Inventory Product** refers to a physical product that is actively
    stocked and tracked in the warehouse. It contains details like SKU, pricing, and
    stock levels, making them essential for efficient inventory management.<br> A
    **Catalogue Product** is a product listed as a catalog on different marketplaces
    like Amazon/Lazada/Shopee etc that provides key details like product name, description,
    and SKU.Sometimes, Catalogue Product needs to be mapped to Inventory Product when
    their SKUs differs or the catalgoue product is bundle multiple inventory products.<br>This
    set of APIs helps manage Inventory Products, including creation, updating, listing,
    and status tracking.<br>
- name: Outbound Bulk Order (B2B)
  description: "\nAn **Outbound Bulk Order** refers to the B2B fulfillment of orders.\
    \ The following steps need to be followed for the creation of Outbound Bulk Orders:\n\
    1. Get the Warehouse List\n   - Make an API call to `Warehouse -> List Warehouses`.\
    \  \n   - The response contains the `warehouse_id`, which can be used in subsequent\
    \ requests.\n2. Get the Warehouse Availability\n   - Use the API: `Warehouse ->\
    \ Get Warehouse Availability`.  \n   - The response provides all the dates and\
    \ their availability.  \n   - A working day from this response can be used as\
    \ `start_time` and `end_time` during B2B creation.\n   \n3. Get the Channels List\
    \ \n   - Use the API: `List Outbound Bulk Order Channels`.  \n   - Select the\
    \ appropriate `channel_code` from the response to include in the payload for the\
    \ Outbound Bulk Order creation API.\n   \n4. Make Create Outbound Bulk Order\n\
    \t- Make API call `Create Outbound Bulk Order` with the appropriate fields which\
    \ is provided by previous API calls in previous steps.\n"
- name: Inbound Consignment
  description: These API are used to create and manage the Inbound/Purchase Order
    in Locad system. Fist step towards sending the inbound consignment to warehouse
    is to create Inbound in Locad System. Other APIs can be used for getting status,
    details etc
- name: Custom Webstore (B2C)
  description: "\nUtilize the **Custom Webstore (B2C) API** to create B2C orders,\
    \ send waybills (if required), and retrieve order information. You can also create\
    \ catalogue product if kit product is there, and retrieve stock information by\
    \ location.\n\n\nBelow is a list of order statuses. The diagram further illustrates\
    \ the flow of these statuses, showing that till which point an order can be cancelled\
    \ (before the PICKED status). Also, Statuses in Green sketch boxes (CANCELLED,\
    \ COMPLETED and RETURN_COMPLETED) are terminal statuses.\n\n\n<img src='https://locad-api-doc.s3.ap-southeast-1.amazonaws.com/b2c_order_status_flow.png'\
    \ alt='Order Status Flow'>\n   "
- name: Shipping (Separate Service)
  description: "\nThis is an separate service and only required if you want to ship\
    \ parcels from your own warehouse with Locad's Carriers.\nThese APIs are used\
    \ to create, manage, and track shipments within the Locad system.Using these endpoints,\
    \ you can perform operations such as creating shipment orders, managing pickup\
    \ locations, and downloading waybills.\n\nCarriers/Last Mile for Custom Webstore(B2C),\
    \ Outbound Bulk Order(B2B), Marketplace Orders(B2C) are not controlled by these\
    \ APIs.\n\nIf you wish to only use the **Shipping APIs**, you will need to integrate\
    \ only **Authentication API before Shipping APIs**.\n\n\nBelow is a list of shipment\
    \ order statuses. The diagram further illustrates the flow of these statuses,\
    \ showing that till which point an order can be cancelled and which statuses are\
    \ terminal statuses.\n\n\n<img src='https://locad-api-doc.s3.ap-southeast-1.amazonaws.com/shipment_order_status_flow.png'\
    \ alt='Shipment Order Status Flow'>\n   "
