  /openapi/{version}/marketplace_orders/:
    get:
      operationId: openapi_marketplace_orders_list
      description: List all orders created in our System (Locad OMS) from all integrated
        marketplaces (Shopify, Shopee, Lazada, Custom, etc.). The endpoint supports
        extensive filtering capabilities including order timeframes, payment methods,
        fulfillment status, marketplace status, geographical filters, and more. Refer
        to the query parameters for all available filtering options.
      summary: List Orders
      parameters:
      - in: query
        name: country
        schema:
          type: string
        description: "Filter by country code. \nExample: `?country=PH`"
      - in: query
        name: created_after
        schema:
          type: string
        description: "Retrieve all orders created after the given datetime (referring\
          \ to `marketplace_create_time` in the order). \nExample: `?created_after=2024-01-01:00:00:00`"
      - in: query
        name: created_before
        schema:
          type: string
        description: "Retrieve all orders created before the given datetime (referring\
          \ to `marketplace_create_time` in the order). \nExample: `?created_before=2024-01-01:00:00:00`"
      - in: query
        name: destination_city
        schema:
          type: string
        description: "Filter orders by order's destination city name (shipping address).\
          \ \nExample: `?destination_city=Makati`"
      - in: query
        name: destination_country
        schema:
          type: string
        description: "Filter orders by order's destination country code (shipping\
          \ address). \nExample: `?destination_country=PH`"
      - in: query
        name: destination_state
        schema:
          type: string
        description: "Filter orders by order's destination state name (shipping address).\
          \ \nExample: `?destination_state=Manila`"
      - in: query
        name: has_waybill
        schema:
          type: string
        description: "Filter orders based on waybill is available or not. \nExample:\
          \ `?has_waybill=Yes`"
      - in: query
        name: is_draft
        schema:
          type: string
        description: "Use this filter to get all draft orders. \nExample: `?is_draft=false`"
      - in: query
        name: is_edited
        schema:
          type: string
        description: "Use this filter to get all edited orders. \nExample: `?is_edited=false`"
      - in: query
        name: last_mile_status
        schema:
          type: string
        description: "Filter by Last Mile Status (comma-separated). \nExample: `?last_mile_status=IN_TRANSIT,DELIVERED`"
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: marketplace
        schema:
          type: string
        description: "Filter by marketplace connection name. \nExample: `?marketplace=ShopName`"
      - in: query
        name: marketplace_status
        schema:
          type: string
        description: "Filter by Marketplace Status (comma-separated). \nExample: `?marketplace_status=IN_TRANSIT,NEW`"
      - in: query
        name: marketplace_type
        schema:
          type: string
          enum:
          - amazon
          - bbo
          - capillary
          - custom
          - ebay
          - ginee
          - kumu
          - lazada
          - mockmarketplace
          - shopee
          - shopify
          - temu
          - tiktok
          - tokopedia
          - wix
          - woocommerce
          - zalora
          - zid
        description: "Filter by marketplace type. \nExample: `?marketplace_type=shopify`"
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: payment_method
        schema:
          type: string
        description: "Filter by payment_method (comma-separated). \nExample: `?payment_method=COD,Card`"
      - in: query
        name: search
        schema:
          type: string
        description: "Search by marketplace_order_ref or marketplace_order_id. \n\
          Example: `?search=ordertest123`"
      - in: path
        name: version
        schema:
          type: string
          pattern: ^(v2)$
        required: true
      - in: query
        name: warehouse_status
        schema:
          type: string
        description: "Filter by Warehouse Status (comma-separated). \nExample: `?warehouse_status=ON_HOLD,CANCELLED`"
      tags:
      - Marketplace Orders (B2C)
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopedOrderOpenAPIList'
              examples:
                ListOfOrdersResponseExample:
                  value:
                    success: true
                    data:
