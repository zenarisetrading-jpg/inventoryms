        ```bash
        curl --location '{{url}}/openapi/v2/consignments/channels/upsert-outbound-address/' \
        --header 'Content-Type: application/json' \
        --header 'Authorization: Bearer {{token}}' \
        --data '{
          "address_reference_name": "Singapore Distribution Centre",
          "address": {
            "address_line1": "10 ABC Crescent",
            "address_line2": "#06 ABC Techpark",
            "address_line3": "Building XYZ",
            "phone": "+65-12345678",
            "city": "Singapore",
            "state": "Central Region",
            "country": "Singapore",
            "suburb": "Ubi",
            "zipcode": "408564",
            "email": "john.doe@example.com"
          },
          "channel_id": 5,
          "channel_code": "SGCHANNEL001"
        }'
